<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="600" cy="315" r="300" fill="#6366f1" opacity="0.06"/>
  <circle cx="600" cy="315" r="180" fill="#6366f1" opacity="0.04"/>

  <!-- File icon -->
  <g transform="translate(530, 140)">
    <rect x="0" y="0" width="140" height="170" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2.5"/>
    <rect x="0" y="0" width="140" height="40" rx="12" fill="#6366f1" opacity="0.15"/>
    <rect x="0" y="28" width="140" height="12" fill="#6366f1" opacity="0.15"/>
    <text x="70" y="27" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="14" font-weight="600">.md</text>
    <!-- Lines -->
    <rect x="20" y="56" width="80" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="20" y="74" width="100" height="6" rx="3" fill="#475569" opacity="0.4"/>
    <rect x="20" y="92" width="60" height="6" rx="3" fill="#475569" opacity="0.4"/>
    <rect x="20" y="116" width="90" height="6" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="20" y="134" width="70" height="6" rx="3" fill="#475569" opacity="0.4"/>
    <rect x="20" y="152" width="50" height="6" rx="3" fill="#475569" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="390" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="-0.02em">CLAUDE.md 하나로</text>
  <text x="600" y="440" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="-0.02em">AI를 팀원으로 만든 방법</text>

  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="18">Claude Code + 문서 자동화</text>

  <!-- Bottom accent line -->
  <rect x="480" y="520" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
