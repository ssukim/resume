    <text x="100" y="263" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">QA qa/</text>

    <line x1="100" y1="282" x2="100" y2="306" stroke="#c4b5fd" stroke-width="2" opacity="0.5"/>
    <polygon points="94,302 100,312 106,302" fill="#c4b5fd" opacity="0.5"/>

    <rect x="0" y="312" width="200" height="48" rx="8" fill="#6366f1" opacity="0.9"/>
    <text x="100" y="341" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">배포 ✓</text>
  </g>

  <!-- Label: AI teammate -->
  <rect x="880" y="180" width="240" height="40" rx="20" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1"/>
