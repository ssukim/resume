  <!-- Markdown content -->
  <g font-family="monospace" font-size="13">
    <text x="244" y="192" fill="#6366f1" font-weight="700"># Claude Code 프로젝트 규칙</text>

    <text x="244" y="220" fill="#8b949e">conma 팀원과 AI가 함께 일하는 공간</text>

    <text x="244" y="256" fill="#d2a8ff" font-weight="700">## 명령어</text>

    <text x="244" y="284" fill="#7ee787">### &quot;피처 생성해줘&quot;</text>
    <text x="244" y="306" fill="#8b949e">→ 폴더 + 문서 10개 자동 생성</text>

    <text x="244" y="338" fill="#7ee787">### &quot;개발자료 최신화 해줘&quot;</text>
    <text x="244" y="360" fill="#8b949e">→ Git 커밋 → 문서 자동 동기화</text>

    <text x="244" y="392" fill="#7ee787">### &quot;QA 해줘&quot;</text>
    <text x="244" y="414" fill="#8b949e">→ 체크리스트 자동 실행 + 스크린샷</text>

    <text x="244" y="446" fill="#7ee787">### &quot;핸드오프 만들어줘&quot;</text>
    <text x="244" y="468" fill="#8b949e">→ Figma → 디자인 스펙 자동 생성</text>

    <text x="244" y="500" fill="#d2a8ff" font-weight="700">## 네이밍 규칙</text>
  </g>

