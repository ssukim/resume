<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="600" cy="280" r="260" fill="#3b82f6" opacity="0.06"/>
  <circle cx="600" cy="280" r="140" fill="#3b82f6" opacity="0.04"/>

  <!-- Color dots: before (red-ish) → after (blue/green) -->
  <g transform="translate(340, 160)">
    <!-- Before dots -->
    <circle cx="0" cy="0" r="28" fill="#f87171" opacity="0.25"/>
    <circle cx="70" cy="0" r="28" fill="#f87171" opacity="0.2"/>
    <circle cx="140" cy="0" r="28" fill="#f87171" opacity="0.15"/>

    <!-- Arrow -->
    <rect x="195" y="-4" width="130" height="8" rx="4" fill="#475569" opacity="0.3"/>
    <polygon points="330,-10 350,0 330,10" fill="#475569" opacity="0.3"/>

    <!-- After dots -->
    <circle cx="380" cy="0" r="28" fill="#3b82f6" opacity="0.35"/>
    <circle cx="450" cy="0" r="28" fill="#10b981" opacity="0.3"/>
    <circle cx="520" cy="0" r="28" fill="#06b6d4" opacity="0.25"/>
  </g>

  <!-- Big number -->
  <text x="600" y="340" text-anchor="middle" fill="#3b82f6" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" opacity="0.15">420</text>

  <!-- Title -->
  <text x="600" y="390" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="-0.02em">420개 Tailwind 클래스를</text>
  <text x="600" y="440" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="-0.02em">깨지 않고 마이그레이션</text>

  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="18">3-Phase 디자인 토큰 리팩토링</text>

  <!-- Bottom accent line -->
  <rect x="480" y="520" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
